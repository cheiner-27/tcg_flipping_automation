name: TCG Arbitrage Search

on:
  schedule:
    # Every day at 23:00 UTC (7 PM EDT / 6 PM EST).
    # Even run numbers → Magic: The Gathering; odd → Pokémon.
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: 'Force a specific game (pokemon or magic). Leave empty to auto-alternate.'
        required: false
        default: ''

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 5-hour safety cap

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine category
        id: pick_category
        run: |
          OVERRIDE="${{ github.event.inputs.category }}"
          if [ -n "$OVERRIDE" ]; then
            echo "category=$OVERRIDE" >> "$GITHUB_OUTPUT"
          elif (( ${{ github.run_number }} % 2 == 0 )); then
            echo "category=magic" >> "$GITHUB_OUTPUT"
          else
            echo "category=pokemon" >> "$GITHUB_OUTPUT"
          fi

      - name: Run TCG arbitrage workflow
        run: python src/main.py
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_DISMISSED_TABLE: dismissed_cards
          TCG_CATEGORY: ${{ steps.pick_category.outputs.category }}
          POKEMON_MIN_PRICE: '30'
          POKEMON_MAX_PRICE: '3000'
          MAGIC_MIN_PRICE: '40'
          MAGIC_MAX_PRICE: '2000'
          BUYER_COUNTRY: US
          BUYER_ZIP: '21015'
          MAX_AUCTION_DAYS: '2'
          MIN_ROI: '0.05'

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tcg-results-${{ steps.pick_category.outputs.category }}-${{ github.run_number }}
          path: output/
          retention-days: 30
